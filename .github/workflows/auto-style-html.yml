name: Auto Style HTML Articles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  process-html-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Run article processing script
        run: python3 .github/scripts/process_articles.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add articles/ index.html index.template.html
          git diff --staged --quiet || git commit -m "Auto: Update articles in index.html"
          git diff --staged --quiet && echo "No changes to commit" || git push
