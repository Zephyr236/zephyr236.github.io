name: Auto Style HTML Articles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  process-html-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Add front matter and standalone class
        run: |
          cat > process_html.py << 'PYEOF'
          import os
          import re

          articles_dir = 'articles'
          if not os.path.exists(articles_dir):
            print(f'Directory {articles_dir} does not exist, skipping...')
            exit(0)

          for filename in os.listdir(articles_dir):
            if filename.endswith('.html'):
              filepath = os.path.join(articles_dir, filename)
              with open(filepath, 'r', encoding='utf-8') as f:
                content = f.read()

              # Skip if already has front matter
              if content.startswith('---'):
                print(f'Skipping (has front matter): {filepath}')
                continue

              # Add class="standalone" to body tag if not already present
              if 'class="standalone"' not in content:
                content = re.sub(r'<body([^>]*)>', r'<body\1 class="standalone">', content)

              # Extract title
              title_match = re.search(r'<title>(.*?)</title>', content)
              title = title_match.group(1) if title_match else os.path.splitext(filename)[0]

              # Extract body content
              body_match = re.search(r'<body[^>]*>(.*?)</body>', content, re.DOTALL)
              body_content = body_match.group(1) if body_match else content

              # Add front matter
              new_content = '---' + '\n'
              new_content += 'layout: default' + '\n'
              new_content += 'title: ' + title + '\n'
              new_content += '---' + '\n\n'
              new_content += body_content

              with open(filepath, 'w', encoding='utf-8') as f:
                f.write(new_content)
              print(f'Processed: {filepath}')
          PYEOF
          python3 process_html.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add articles/
          git diff --staged --quiet || git commit -m "Auto: Add Jekyll front matter to HTML articles"
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git push
